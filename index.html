<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刹那の会計</title>
  <link rel="stylesheet" href="game.css">
</head>
<body class="no_select">
  <!-- 設定ページ -->
  <div id="setupPage">
    <h2>刹那の会計</h2>
    <form id="setupForm">
      <label for="playerCount">人数：</label>
      <select id="playerCount">
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6">6人</option>
      </select>
      <label for="customNumber">数字（5桁まで）：</label>
      <input type="number" id="customNumber" maxlength="5" max="99999" min="0" placeholder="数字を入力">
      <button type="submit" id="goGameBtn">ゲーム開始</button>
    </form>
  </div>

  <!-- ゲームページ -->
  <div id="gamePage" class="hidden">
    <button id="backToSetupBtn">設定画面に戻る</button>
    <div class="center-area"> <!--この上にボタンを覆えるほどの階層を作成し、そのサイズを固定させることでズレを防ぐ or 生成前と生成後のオブジェクトを同じ箱に入れてサイズを固定する-->
      <div class="col" id="leftCol"></div>
      <div class="time" id="timeText">
        <img id="timeImage" src="time.png" alt="Time Image" style="width: 80px; height: 80px;">
      </div>
      <div class="col" id="rightCol"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
